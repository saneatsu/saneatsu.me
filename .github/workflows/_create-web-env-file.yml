name: 🔑 [Common] Create Web env file

on:
  workflow_call:
    inputs:
      ENV:
        description: "Environment name (preview/production)"
        type: string
        required: true
    secrets:
      # Web用環境変数
      NEXT_PUBLIC_API_URL:
        required: true
      # Cloudflare Images
      CLOUDFLARE_ACCOUNT_HASH:
        required: true
      # Mapbox
      NEXT_PUBLIC_MAPBOX_TOKEN:
        required: false
      # NextAuth.js関連
      NEXTAUTH_URL:
        required: true
      NEXTAUTH_SECRET:
        required: true
      GOOGLE_CLIENT_ID:
        required: true
      GOOGLE_CLIENT_SECRET:
        required: true
      # 管理者設定
      ADMIN_EMAILS:
        required: true
      # Basic認証関連
      BASIC_AUTH_USER:
        required: true
      BASIC_AUTH_PASSWORD:
        required: true
      # Google Form
      NEXT_PUBLIC_GOOGLE_FORM_RESPONSES_URL:
        required: false
      # Gemini API
      GEMINI_API_KEY:
        required: false

env:
  ENV: ${{ inputs.ENV }}

jobs:
  # Web用の .env ファイルを作成し、Artifactとしてアップロードする
  create:
    runs-on: ubuntu-latest
    steps:
      - name: Create Web .env file for ${{ env.ENV }}
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          CLOUDFLARE_ACCOUNT_HASH: ${{ secrets.CLOUDFLARE_ACCOUNT_HASH }}
          NEXT_PUBLIC_MAPBOX_TOKEN: ${{ secrets.NEXT_PUBLIC_MAPBOX_TOKEN }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          AUTH_TRUST_HOST: "true"
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          ADMIN_EMAILS: ${{ secrets.ADMIN_EMAILS }}
          BASIC_AUTH_USER: ${{ secrets.BASIC_AUTH_USER }}
          BASIC_AUTH_PASSWORD: ${{ secrets.BASIC_AUTH_PASSWORD }}
          NEXT_PUBLIC_GOOGLE_FORM_RESPONSES_URL: ${{ secrets.NEXT_PUBLIC_GOOGLE_FORM_RESPONSES_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          ENV_FILE=".env"
          echo "Creating Web $ENV_FILE for ${{ env.ENV }} environment..."

          # API URL
          echo "NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL" >> $ENV_FILE

          # Cloudflare Images
          echo "NEXT_PUBLIC_CLOUDFLARE_ACCOUNT_HASH=$CLOUDFLARE_ACCOUNT_HASH" >> $ENV_FILE

          # Mapbox
          echo "NEXT_PUBLIC_MAPBOX_TOKEN=$NEXT_PUBLIC_MAPBOX_TOKEN" >> $ENV_FILE

          # NextAuth.js関連
          echo "NEXTAUTH_URL=$NEXTAUTH_URL" >> $ENV_FILE
          echo "NEXTAUTH_SECRET=$NEXTAUTH_SECRET" >> $ENV_FILE
          echo "AUTH_TRUST_HOST=$AUTH_TRUST_HOST" >> $ENV_FILE

          # Google OAuth
          echo "GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID" >> $ENV_FILE
          echo "GOOGLE_CLIENT_SECRET=$GOOGLE_CLIENT_SECRET" >> $ENV_FILE

          # 管理者設定
          echo "ADMIN_EMAILS=$ADMIN_EMAILS" >> $ENV_FILE

          # Basic認証設定
          echo "BASIC_AUTH_USER=$BASIC_AUTH_USER" >> $ENV_FILE
          echo "BASIC_AUTH_PASSWORD=$BASIC_AUTH_PASSWORD" >> $ENV_FILE

          # Google Form（オプション）
          if [ -n "$NEXT_PUBLIC_GOOGLE_FORM_RESPONSES_URL" ]; then
            echo "NEXT_PUBLIC_GOOGLE_FORM_RESPONSES_URL=$NEXT_PUBLIC_GOOGLE_FORM_RESPONSES_URL" >> $ENV_FILE
          fi

          # Gemini API（オプション）
          if [ -n "$GEMINI_API_KEY" ]; then
            echo "GEMINI_API_KEY=$GEMINI_API_KEY" >> $ENV_FILE
          fi

          echo "✅ Created Web $ENV_FILE with ${{ env.ENV }} configuration"

      - name: Upload .env as an artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-env-file-${{ env.ENV }}
          path: .env
          include-hidden-files: true
