name: 📗 Docs Build Check

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    paths:
      - apps/docs/**
      - packages/**
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - turbo.json
      - .github/workflows/deploy-docs.yml

jobs:
  docs-build:
    name: Build docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Enable corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # TODO: 将来的にCloudflare Pages等への自動デプロイを追加する
      - name: Build docs
        run: pnpm --filter @saneatsu/docs build
